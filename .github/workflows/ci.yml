name: CI

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: python -m pip install --upgrade pip && pip install -e ".[dev]"
      - name: Lint
        run: ruff check src tests
      - name: Compile
        run: python -m compileall -q src
      - name: Test
        run: pytest --cov=tip --cov-report=term-missing
      - name: Static security scan
        run: bandit -q -r src
      - name: Dependency audit
        run: pip-audit

  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t infotact-tip:${{ github.sha }} .
