services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "127.0.0.1:27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 12

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "127.0.0.1:9200:9200"
    volumes:
      - elastic_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health"]
      interval: 15s
      timeout: 5s
      retries: 20

  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.3
    restart: unless-stopped
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "127.0.0.1:5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy

  api:
    build: .
    restart: unless-stopped
    env_file: [.env]
    command: ["serve", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      mongo:
        condition: service_healthy

  collector:
    build: .
    profiles: ["jobs"]
    env_file: [.env]
    command: ["collect"]
    depends_on:
      mongo:
        condition: service_healthy

  siem-sync:
    build: .
    profiles: ["jobs"]
    env_file: [.env]
    command: ["sync-siem"]
    depends_on:
      mongo:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy

  enforcer-dry-run:
    build: .
    profiles: ["jobs"]
    env_file: [.env]
    command: ["enforce"]
    depends_on:
      mongo:
        condition: service_healthy

volumes:
  mongo_data:
  elastic_data:
